<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikipedia Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="wikipedia.css">
</head>
<body>
    <div class="background-elements">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="main-container">
        <header class="wiki-search-header">
            <div class="logo-container">
                <i class="fa-brands fa-wikipedia-w logo-icon"></i>
                <h1 class="logo-text">Wikipedia<span class="logo-highlight">Search</span></h1>
            </div>
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input placeholder="Type a keyword and press Enter..." type="search" class="search-input" id="searchInput" autocomplete="off" spellcheck="false" />
                <button class="clear-btn d-none" id="clearBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
        </header>

        <main class="content-area">
            <div class="loader-container d-none" id="spinner">
                <div class="custom-loader"></div>
                <p class="loader-text">Searching the encyclopedia...</p>
            </div>
            
            <div class="error-message d-none" id="errorMessage">
                <i class="fa-solid fa-circle-exclamation error-icon"></i>
                <p id="errorText">No results found.</p>
            </div>

            <div class="search-results" id="searchResults">

            </div>
        </main>
    </div>

    <script src="wikipedia.js"></script>
</body>
</html>
